_target_: lattice_lab.data.AdapterDataModule

shard_dir: artifacts/processed/moses
batch_size: 64
val_ratio: 0.005
test_ratio: 0.005
split_seed: 0
seed: ${seed}

# Must be true iff model.fp_weight > 0 (fingerprint distillation needs SMILES in
# the batch). Keep the two in sync; the adapter_fp experiment sets both.
use_fp: false
same_view_pairs: false
run_validation: true
num_workers: 0
