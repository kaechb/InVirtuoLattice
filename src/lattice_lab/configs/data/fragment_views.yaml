_target_: lattice_lab.data.fragment_views.FragmentViewDataModule

shard_dir: artifacts/preprocessing/processed/moses
batch_size: 512
val_ratio: 0.005
test_ratio: 0.005
split_seed: 0
run_validation: true
num_workers: 4
# Fallback runtime tokenization when shards lack body_ids (Stage 1 --tokenizer-path).
tokenizer_path: null
# Yield (view, smiles) pairs so the module can build Morgan fingerprints for the
# similarity-distillation loss. Enable together with model.fp_weight > 0.
return_smiles: true
# Cross-modal 3D view: off in the base config (experiment=adapter3d sets these).
# conformer_cache = precomputed conformers.parquet (precompute_conformers); null =
# no 3D view. atom_dict_path null -> packaged assets/dict_mol.txt.
conformer_cache: null
atom_dict_path: null
max_atoms: 256         # cap heavy atoms per conformer
