# @package _global_
# EBM hard-negative training on NT-Xent adapter + decoy pools.
#
#   python -m lattice_lab.train experiment=ebm_hardneg_ntxent
defaults:
  - ebm_hardneg

tags: ["ebm", "hardneg", "ntxent"]

# W&B run id from Stage 2 (edit after adapter SSL training).
ssl_run_id: 1kfmwoar

data:
  decoy_store: artifacts/decoys/ntxent/decoy_zm/
  bdb_store: artifacts/decoys/ntxent/bdb_zm
  binder_store: artifacts/binders/ntxent/binder_zm

model:
  encoder:
    adapter_ckpt: artifacts/adapter/ntxent/checkpoints/${ssl_run_id}/last.ckpt

logger:
  wandb:
    group: ssl_compare_ntxent
    name: ebm_hardneg_ntxent
