_target_: lattice_lab.models.denoising_jepa_ssl.DenoisingJEPAModule

ckpt_path: artifacts/checkpoints/invirtuo_gen.ckpt
tokenizer_path: artifacts/tokenizer/smiles_new.json
encode_time: 1.0
freeze_backbone: true
token_id_min: 4
pool_heads: 8
adapter_n_layers: 2   # trainable Adapter (token-mixing transformer) over the frozen backbone; 0 = pool only

corrupt_t: [0., .3]
corrupt_t_cap: 1.0e-3
path_power: 1.0

shuffle_fragments: true
frag_sep_id: 4

align_lambda: 0

# NT-Xent (SimCLR) on z_s between two fragment-shuffles of the same molecule, with
# in-batch negatives — pulls positives together, pushes other molecules apart
# (anti-collapse + molecule-discriminative). Needs shuffle_fragments=true. 0 = off.
contrastive_lambda: 0.1
contrastive_temperature: 0.1

fp_weight: 0.0
fp_radius: 2
fp_bits: 2048

sigreg_lambda: 0.05
sigreg_num_projections: 256
sigreg_knots: 17
sigreg_t_max: 3.0

use_visreg: true
visreg_gamma: 1.0
visreg_shape_coeff: 1.0
visreg_num_projections: 4096

latent_l2_weight: 1.0e-4

cond_noise_scale: 1

latent_consistency_lambda: 0.0

learning_rate: 1.0e-4
weight_decay: 0.01
warmup_steps: 500

condition_corrupt_t: 0.1
condition_margin: 0.1
condition_hard_fail: false
train_rank_every_n_steps: 50
log_grad_norms: false

val_probe_n_molecules: 2000
val_probe_every_n_epochs: 1
val_probe_encode_batch_size: 128
val_probe_ridge_alpha: 1.0
val_probe_test_size: 0.2
val_probe_tsne_perplexity: null

seed: ${seed}
