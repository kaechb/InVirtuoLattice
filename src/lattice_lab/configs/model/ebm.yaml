_target_: lattice_lab.models.EBMLitModule

adapter_ckpt: artifacts/adapter/checkpoints_ssl2/adapter_v1.pt
resume_from: null

d_adapter: ${d_adapter}
d_protein: ${d_protein}
n_fragmol_layers: 4
head_arch: cross_attn          # cross_attn | film
n_decoys: ${n_decoys}

learning_rate: 3.0e-4
weight_decay: 0.01
num_steps: ${trainer.max_steps}
warmup_steps: 500

temperature: 0.1
lambda_sink: 1.0
lambda_sink_warmup: 10000
lambda_neg: 1.0
cross_target_p: 1.0
cross_target_margin: 2.0

# Online hard-negative mining (must match data.hard_mining_mult).
hard_mining_mult: ${data.hard_mining_mult}
hard_skip_frac: 0.05

finetune_adapter: false
adapter_lr: 3.0e-5

bedroc_alpha: 80.5
seed: ${seed}
