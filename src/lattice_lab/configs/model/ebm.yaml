_target_: lattice_lab.models.ebm.EBMLitModule

encoder:
  # Load the full Stage-2 encoder (backbone + adapter + time) from its own ckpt.
  # The ckpt is self-describing (embeds encoder_config), so the hook layer range,
  # dims and d_adapter all come from training — nothing is re-specified here.
  _target_: lattice_lab.models.builders.load_encoder_from_ckpt
  ckpt: artifacts/adapter/checkpoints/${ssl_run_id}/last.ckpt

resume_from: null

d_adapter: ${d_adapter}
d_protein: ${d_protein}
n_decoys: ${n_decoys}
# film = FiLM energy MLP (default); cosine = linear contrastive matching baseline
head_type: film

learning_rate: 3.0e-4
weight_decay: 0.01
num_steps: ${trainer.max_steps}
warmup_steps: 500

temperature: 0.1
lambda_sink: 1.0
lambda_sink_warmup: 10000
lambda_neg: 1.0
cross_target_p: 1.0
cross_target_margin: 2.0

# Online hard-negative mining (must match data.hard_mining_mult).
hard_mining_mult: ${data.hard_mining_mult}
hard_skip_frac: 0.05

bedroc_alpha: 80.5
seed: ${seed}
